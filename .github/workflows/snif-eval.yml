name: Snif Eval

on:
  push:
    branches: [main]
    paths:
      - 'crates/snif-prompts/**'
      - 'crates/snif-output/**'
      - 'crates/snif-execution/**'
      - 'crates/snif-config/**'
      - 'crates/snif-eval/**'
      - 'fixtures/**'
      - '.snif.json'

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Restore eval history
        uses: actions/cache@v4
        with:
          path: eval-history.jsonl
          key: eval-history-${{ github.sha }}
          restore-keys: eval-history-

      - name: Build
        run: cargo build --release

      - name: Run evaluation
        run: ./target/release/snif eval --fixtures ./fixtures/ --history eval-history.jsonl
        env:
          SNIF_API_KEY: ${{ secrets.SNIF_API_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          SNIF_BRAINTRUST_PROJECT_ID: ${{ secrets.SNIF_BRAINTRUST_PROJECT_ID }}
