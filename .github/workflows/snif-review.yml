name: Snif Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache Snif index
        uses: actions/cache@v4
        with:
          path: .snif
          key: snif-index-${{ hashFiles('**/*.rs', '**/*.ts', '**/*.py') }}
          restore-keys: snif-index-

      - name: Build
        run: cargo build --release

      - name: Index repository
        run: ./target/release/snif index --path .
        env:
          SNIF_API_KEY: ${{ secrets.SNIF_API_KEY }}
          RUST_LOG: info

      - name: Review pull request
        run: |
          ./target/release/snif review \
            --path . \
            --repo "$GITHUB_REPO" \
            --pr "$PR_NUMBER" \
            --format json
        env:
          SNIF_APP_ID: ${{ secrets.SNIF_APP_ID }}
          SNIF_APP_PRIVATE_KEY: ${{ secrets.SNIF_APP_PRIVATE_KEY }}
          SNIF_APP_INSTALLATION_ID: ${{ secrets.SNIF_APP_INSTALLATION_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNIF_API_KEY: ${{ secrets.SNIF_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SNIF_PR_NUMBER: ${{ github.event.pull_request.number }}
          RUST_LOG: info
